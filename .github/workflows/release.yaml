name: Release GitHub Action

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type check
        run: bun run typecheck

  release:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    concurrency:
      group: release-action
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version and publish release
        run: |
          set -euo pipefail

          current_version="$(node -p "require('./package.json').version")"
          if [[ ! "${current_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Package version must be a patch SemVer value, got: ${current_version}" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          releases="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq '.[] | [.tag_name, (if .draft then "draft" else "published" end)] | @tsv')"
          candidate="${current_version}"
          release_tag=""
          publish_existing_draft="false"

          while true; do
            release_line="$(
              printf '%s\n' "${releases}" \
                | awk -F '\t' -v version="${candidate}" '$1 == version || $1 == "v" version { print $1 "\t" $2; exit }'
            )"
            release_tag="$(printf '%s' "${release_line}" | awk -F '\t' '{ print $1 }')"
            status="$(printf '%s' "${release_line}" | awk -F '\t' '{ print $2 }')"

            if [ "${status}" = "draft" ]; then
              echo "Draft release already exists for ${candidate}; it will be published"
              publish_existing_draft="true"
              break
            fi

            if [ "${status}" = "published" ] || git rev-parse -q --verify "refs/tags/${candidate}" >/dev/null || git rev-parse -q --verify "refs/tags/v${candidate}" >/dev/null; then
              echo "Version ${candidate} already exists; checking next patch version"
              patch=$((patch + 1))
              candidate="${major}.${minor}.${patch}"
              continue
            fi

            break
          done

          if [ "${candidate}" != "${current_version}" ]; then
            node -e "const fs = require('fs'); const pkg = require('./package.json'); pkg.version = '${candidate}'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore(release): ${candidate}"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

          target="$(git rev-parse HEAD)"
          if [ "${publish_existing_draft}" = "true" ]; then
            gh release edit "${release_tag}" --draft=false --title "${candidate}" --target "${target}"
          else
            gh release create "${candidate}" --title "${candidate}" --target "${target}" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
